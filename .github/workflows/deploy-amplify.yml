name: Deploy Amplify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-amplify-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-1
  AMPLIFY_APP_ID: d1tvp4oub2aan6
  AMPLIFY_BRANCH: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      - name: Build calendar
        run: python -m pompomcrawler.cli export-html --output-dir docs --filename index.html --aws-runtime
        env:
          POMPOM_API_BASE_URL: https://pg2isf3a64.execute-api.ap-northeast-1.amazonaws.com
          POMPOM_COGNITO_DOMAIN: https://pompomcrawler-154052710150-ap-northeast-1.auth.ap-northeast-1.amazoncognito.com
          POMPOM_COGNITO_CLIENT_ID: 18nu3dt9he0j5l4lg7bdlno83t
          POMPOM_COGNITO_REDIRECT_URI: https://main.d1tvp4oub2aan6.amplifyapp.com/
          POMPOM_COGNITO_LOGOUT_URI: https://main.d1tvp4oub2aan6.amplifyapp.com/
          POMPOM_NEW_LABEL_AFTER: 2026-05-31T00:00:00+00:00

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::154052710150:role/pompomcrawler-github-amplify-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Amplify deployment
        run: |
          aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --output json > /tmp/amplify-deployment.json
          python -c "import json; data=json.load(open('/tmp/amplify-deployment.json')); print(data['jobId'])" > /tmp/amplify-job-id
          python -c "import json; data=json.load(open('/tmp/amplify-deployment.json')); print(data['zipUploadUrl'])" > /tmp/amplify-upload-url
          cd docs
          zip -r /tmp/pompom-amplify.zip .
          curl --fail --silent --show-error --request PUT --upload-file /tmp/pompom-amplify.zip "$(cat /tmp/amplify-upload-url)"

      - name: Start Amplify deployment
        run: |
          JOB_ID="$(cat /tmp/amplify-job-id)"
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-id "$JOB_ID"
          for attempt in {1..60}; do
            STATUS="$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text)"
            echo "Amplify job $JOB_ID status: $STATUS"
            case "$STATUS" in
              SUCCEED) exit 0 ;;
              FAILED|CANCELLED) exit 1 ;;
            esac
            sleep 5
          done
          echo "Amplify job $JOB_ID did not finish in time"
          exit 1
