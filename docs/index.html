    :root {

      --bg: #f7f5ef;
      --surface: #ffffff;
      --ink: #25211c;
      --muted: #6d665d;
      --line: #ded8ce;
      --accent: #0f766e;
      --accent-soft: #d7efec;
      --gold: #e0a92f;
      --rose: #cf5b73;
      --blue: #3b6ea8;
      --green: #3d8b5b;

    * { box-sizing: border-box; }
    body {

    button, input, select { font: inherit; }
    a { color: inherit; }
    .app-shell { min-height: 100vh; }
    .topbar {

      top: 0;

      backdrop-filter: blur(16px);
    }
    .topbar-inner {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 14px 20px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 2.2vw, 30px);
      letter-spacing: 0;
      line-height: 1.15;
    }
    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .month-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }
    .icon-button, .text-button {
      min-height: 40px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(37, 33, 28, .04);
    }
    .icon-button {

      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      font-size: 20px;
      line-height: 1;
    }
    .text-button {
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 700;
    }
    .icon-button:hover, .text-button:hover { border-color: var(--accent); }
    .layout {

      margin: 0 auto;
      padding: 18px 20px 32px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }
    .toolbar {

      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(2, minmax(150px, 190px)) auto;
      gap: 10px;
      align-items: center;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
    }
    .field span { color: var(--muted); }
    .field input, .field select {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      grid-column: 1 / -1;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
    }
    .stat strong { display: block; font-size: 24px; line-height: 1; }
    .stat span { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; }
    .calendar-panel, .side-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .calendar-head {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #f2eee5;
    }
    .weekday {
      padding: 10px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }
    .day {
      min-height: 132px;
      padding: 8px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fffdfa;
      overflow: hidden;
    }
    .day:nth-child(7n) { border-right: 0; }
    .day.is-muted { background: #f6f3ed; color: #8b8479; }
    .day.is-today {
      background: #eef8f6;
      box-shadow: inset 0 0 0 3px var(--accent);
    }

      margin-bottom: 6px;
      font-weight: 800;
      font-size: 13px;

      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(15, 118, 110, .24);

    .day-count {
      min-width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
    }
    .event-list {
      display: grid;
      gap: 5px;
    }
    .event-pill {
      display: block;
      width: 100%;
      min-height: 32px;
      padding: 5px 7px;
      border: 0;
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      background: #eef8f6;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      overflow: hidden;

    .event-pill strong {

      white-space: nowrap;
      font-size: 12px;
      letter-spacing: 0;

    .event-pill span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 11px;

      const scoped = state.selectedDate ? items.filter(item => item.primaryDate === state.selectedDate) : items;
      const dated = scoped.filter(item => item.primaryDate).sort((a, b) => a.primaryDate.localeCompare(b.primaryDate));
      const undated = scoped.filter(item => !item.primaryDate);
      const ordered = [...dated, ...undated].slice(0, 80);
      agendaTitle.textContent = state.selectedDate ? `${state.selectedDate} の候補` : "候補一覧";
      agendaSubtitle.textContent = state.selectedDate ? `${ordered.length}件` : "日付が近い順 / 未日付は末尾";
      if (!ordered.length) {
        agenda.innerHTML = `<div class="empty">表示できる候補がありません</div>`;
        return;
      }
      ordered.forEach(item => agenda.append(agendaItem(item)));
    }
    function agendaItem(item) {
      const el = document.createElement("article");
      el.className = "agenda-item";
      el.innerHTML = `
        <h3>${escapeHtml(item.title)}</h3>
        <div class="meta">
          <span class="tag">${escapeHtml(item.kindLabel)}</span>
          <span class="tag ${item.status === "needs_review" ? "review" : item.status}">${escapeHtml(item.statusLabel)}</span>
          <span class="tag">信頼度 ${Math.round(item.confidence * 100)}%</span>
        </div>
        <p class="detail-text">${escapeHtml(dateSummary(item))}</p>
        <p class="detail-text">${escapeHtml(item.sellerOrVenue || item.sourceName || "")}</p>
      `;
      el.addEventListener("click", () => openDetail(item));
      return el;
    }
    function openDetail(item) {
      modalBody.innerHTML = `
        <h2>${escapeHtml(item.title)}</h2>
        <div class="meta">
          <span class="tag">${escapeHtml(item.kindLabel)}</span>
          <span class="tag ${item.status === "needs_review" ? "review" : item.status}">${escapeHtml(item.statusLabel)}</span>
          <span class="tag">信頼度 ${Math.round(item.confidence * 100)}%</span>
        </div>
        <p class="detail-text">${escapeHtml(dateSummary(item))}</p>
        <p class="detail-text">${escapeHtml(item.sellerOrVenue || "")}</p>
        <p class="detail-text">${escapeHtml(item.reviewReason || "")}</p>
        <p class="detail-text">${escapeHtml(item.notes || "")}</p>
        ${sourceLinks(item.sourceUrl)}
      `;
      detailDialog.showModal();
    }
    function dateSummary(item) {
      const rows = [];
      if (item.releaseDate) rows.push(`発売日: ${item.releaseDate}`);
      if (item.startDate || item.endDate) rows.push(`期間: ${item.startDate || "未定"} - ${item.endDate || "未定"}`);
      if (item.reservationStart) rows.push(`予約開始: ${item.reservationStart}`);
      return rows.join(" / ") || "日付未確定";
    }
    function sourceLinks(value) {
      if (!value) return "";
      return value.split(" | ").map(url => `<a class="source-link" href="${escapeAttr(url)}" target="_blank" rel="noreferrer">ソースを開く</a>`).join("<br>");
    }
    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[char]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, "&#96;"); }
  </script>
</body>
</html>
